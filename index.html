<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Baptiste Coaching - Espace Client</title>
<style>
:root{--bg:#09090b;--card:#16161b;--card2:#202027;--text:#f6f6f7;--muted:#9ca3af;--border:#303038;--soft:#27272f}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Inter,sans-serif;line-height:1.45}main{max-width:1100px;margin:auto;padding:24px}.hero,.card,.block{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:20px;margin-bottom:16px}.hero{background:linear-gradient(135deg,#23232b,#101014);padding:30px}h1{font-size:34px;margin:0 0 8px;letter-spacing:-.04em}h2{margin:0 0 12px;font-size:23px}h3{margin:0 0 8px}.muted{color:var(--muted)}input{width:100%;background:#0f0f13;border:1px solid var(--border);color:var(--text);border-radius:12px;padding:13px;font-size:16px}button{border:0;border-radius:12px;padding:12px 15px;font-weight:800;cursor:pointer;background:var(--text);color:#070708;margin-top:10px}.nav button{background:var(--soft);color:var(--text);border:1px solid var(--border);margin-right:6px}.nav button.active{background:var(--text);color:#070708}.grid{display:grid;gap:14px}.grid-2{grid-template-columns:repeat(2,1fr)}.grid-4{grid-template-columns:repeat(4,1fr)}.metric{font-size:24px;font-weight:900}.label{color:var(--muted);font-size:13px}table{width:100%;border-collapse:collapse;font-size:14px;margin-top:8px}th,td{border-bottom:1px solid var(--border);padding:10px;text-align:left;vertical-align:top}th{background:var(--card2);color:var(--muted)}.hidden{display:none}.value{white-space:pre-wrap}.err{color:#ffb4b4;margin-top:10px}@media(max-width:800px){main{padding:14px}.grid-2,.grid-4{grid-template-columns:1fr}h1{font-size:28px}}
</style>
</head>
<body>
<main>
<section id="login"><div class="hero"><h1>Baptiste Coaching</h1><p class="muted">Entre ton code client pour accéder à ton programme.</p></div><div class="card"><h2>Accès client</h2><input id="code" placeholder="Exemple : leopold" onkeydown="if(event.key==='Enter') login()"><button onclick="login()">Ouvrir mon espace</button><div id="error" class="err"></div><p class="muted">Ton coach te donne ton code personnel.</p></div></section>
<section id="app" class="hidden"><div class="hero"><h1 id="clientName"></h1><p id="intro" class="muted"></p></div><div class="nav card"><button class="active" onclick="tab('profile',this)">Profil</button><button onclick="tab('train',this)">Musculation</button><button onclick="tab('food',this)">Alimentation</button><button onclick="tab('follow',this)">Suivi</button><button onclick="tab('notes',this)">Notes</button></div><div id="content"></div></section>
</main>
<script>
const CLIENTS={
"leopold":{name:"Léopold",intro:"Bienvenue dans ton espace coaching. Tu retrouves ici ton programme, ton alimentation et ton suivi.",goal:"Prise de muscle",level:"Intermédiaire",cal:"2400 kcal",prot:"160 g",carbs:"250 g",fat:"70 g",start:"À compléter",end:"À compléter",workouts:[{title:"Séance 1 — Push",muscles:"Pectoraux, épaules, triceps",note:"Garde une exécution propre. Augmente les charges seulement si la technique reste bonne.",exercises:[["Développé couché","4","8-10","2 min",""] ,["Développé incliné haltères","3","10-12","90 sec",""] ,["Élévations latérales","4","12-15","60 sec",""] ,["Extension triceps corde","3","12-15","60 sec",""]]},{title:"Séance 2 — Pull",muscles:"Dos, biceps",note:"Concentre-toi sur le contrôle et l’amplitude.",exercises:[["Tractions ou tirage vertical","4","8-12","2 min",""] ,["Rowing machine","4","10-12","90 sec",""] ,["Tirage horizontal","3","10-12","90 sec",""] ,["Curl biceps","3","12-15","60 sec",""]]}],meals:[{title:"Repas type 1",note:"À adapter selon ta faim et tes horaires.",macros:["600 kcal","40 g","65 g","18 g"],foods:[["Œufs","3"],["Pain complet","80 g"],["Fruit","1"]]},{title:"Repas type 2",note:"Repas simple autour de l’entraînement.",macros:["750 kcal","50 g","85 g","20 g"],foods:[["Poulet","180 g"],["Riz cru","100 g"],["Légumes","À volonté"],["Huile d’olive","10 g"]]}],shopping:"Œufs\nPain complet\nPoulet\nRiz\nLégumes\nFruits\nHuile d’olive",tracking:[["S1","","","","",""] ,["S2","","","","",""] ,["S3","","","","",""] ,["S4","","","","",""]],publicNotes:"Check-in chaque semaine avec poids, photos, sommeil, faim, énergie et performances."},
"baptiste":{name:"Baptiste",intro:"Espace test.",goal:"Sèche",level:"Intermédiaire",cal:"2400 kcal",prot:"160 g",carbs:"250 g",fat:"70 g",start:"À compléter",end:"À compléter",workouts:[{title:"Séance test",muscles:"Full body",note:"Exemple de séance.",exercises:[["Squat","4","8-10","2 min",""] ,["Développé couché","4","8-10","2 min",""] ,["Tirage vertical","4","10-12","90 sec",""]]}],meals:[{title:"Repas test",note:"Exemple de repas.",macros:["600 kcal","40 g","60 g","20 g"],foods:[["Poulet","150 g"],["Riz","100 g"],["Légumes","200 g"]]}],shopping:"Poulet\nRiz\nLégumes",tracking:[["S1","","","","",""]],publicNotes:"Notes visibles client."}
};
let current=null;function esc(v=''){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;')}function login(){const code=document.getElementById('code').value.trim().toLowerCase();const client=CLIENTS[code];if(!client){document.getElementById('error').textContent="Code introuvable. Vérifie l'orthographe avec ton coach.";return}current=client;document.getElementById('login').classList.add('hidden');document.getElementById('app').classList.remove('hidden');document.getElementById('clientName').textContent=client.name;document.getElementById('intro').textContent=client.intro;render('profile')}function tab(name,btn){document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render(name)}function metric(k,v){return `<div class="card"><div class="label">${esc(k)}</div><div class="metric">${esc(v)}</div></div>`}function render(name){if(!current)return;if(name==='profile')document.getElementById('content').innerHTML=`<div class="grid grid-4">${metric('Objectif',current.goal)}${metric('Niveau',current.level)}${metric('Calories',current.cal)}${metric('Protéines',current.prot)}</div><div class="grid grid-4">${metric('Glucides',current.carbs)}${metric('Lipides',current.fat)}${metric('Début',current.start)}${metric('Fin',current.end)}</div>`;if(name==='train')document.getElementById('content').innerHTML=`<div class="card"><h2>Programme musculation</h2></div>`+current.workouts.map(w=>`<div class="block"><h2>${esc(w.title)}</h2><div class="muted">${esc(w.muscles)}</div><table><thead><tr><th>Exercice</th><th>Séries</th><th>Rép.</th><th>Repos</th><th>Tempo</th></tr></thead><tbody>${w.exercises.map(e=>`<tr>${e.map(x=>`<td>${esc(x)}</td>`).join('')}</tr>`).join('')}</tbody></table><div class="card"><h3>Consignes</h3><p class="value">${esc(w.note)}</p></div></div>`).join('');if(name==='food')document.getElementById('content').innerHTML=`<div class="card"><h2>Programme alimentaire</h2></div><div class="grid grid-2">`+current.meals.map(m=>`<div class="block"><h2>${esc(m.title)}</h2><table><thead><tr><th>Aliment</th><th>Quantité</th></tr></thead><tbody>${m.foods.map(f=>`<tr><td>${esc(f[0])}</td><td>${esc(f[1])}</td></tr>`).join('')}</tbody></table><div class="grid grid-4">${metric('Calories',m.macros[0])}${metric('Prot.',m.macros[1])}${metric('Gluc.',m.macros[2])}${metric('Lip.',m.macros[3])}</div><div class="card"><h3>Consignes</h3><p class="value">${esc(m.note)}</p></div></div>`).join('')+`</div><div class="card"><h2>Liste de courses</h2><p class="value">${esc(current.shopping)}</p></div>`;if(name==='follow')document.getElementById('content').innerHTML=`<div class="card"><h2>Suivi</h2><table><thead><tr><th>Semaine</th><th>Poids</th><th>Tour taille</th><th>Photos</th><th>Sommeil</th><th>Notes</th></tr></thead><tbody>${current.tracking.map(r=>`<tr>${r.map(x=>`<td>${esc(x)}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;if(name==='notes')document.getElementById('content').innerHTML=`<div class="card"><h2>Notes du coach</h2><p class="value">${esc(current.publicNotes)}</p></div>`}
</script>
</body>
</html>
