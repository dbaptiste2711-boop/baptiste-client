<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Baptiste Coaching - Espace Client</title><style>
:root{--bg:#09090b;--side:#050506;--card:#16161b;--card2:#202027;--text:#f6f6f7;--muted:#9ca3af;--border:#303038;--soft:#27272f;--green:#12351f;--red:#4b1717;--orange:#3d2b12}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,Arial,sans-serif;line-height:1.45}
button,input,textarea,select{font-family:inherit}
button{border:0;border-radius:12px;padding:10px 13px;font-weight:800;cursor:pointer;background:var(--text);color:#070708;margin:3px}
button.secondary{background:var(--soft);color:var(--text);border:1px solid var(--border)}
button.danger{background:var(--red);color:#ffdede;border:1px solid #793030}
input,textarea,select{width:100%;background:#0f0f13;border:1px solid var(--border);color:var(--text);border-radius:12px;padding:10px 11px;font-size:14px}
textarea{min-height:90px;resize:vertical}
.app{display:grid;grid-template-columns:270px 1fr;min-height:100vh}
aside{background:var(--side);border-right:1px solid var(--border);padding:24px 18px;position:sticky;top:0;height:100vh}
main{padding:30px;max-width:1360px;width:100%}
.logo{font-size:22px;font-weight:950;letter-spacing:-.05em}.sub{font-size:13px;color:var(--muted);margin:5px 0 24px}
.nav{width:100%;text-align:left;background:transparent;color:var(--muted);margin-bottom:7px}
.nav.active,.nav:hover{background:var(--soft);color:var(--text)}
.card,.hero,.block{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:20px;margin-bottom:18px}
.hero{background:linear-gradient(135deg,#23232b,#101014);padding:30px;border-radius:28px}
h1{font-size:38px;margin:0 0 8px;letter-spacing:-.05em}h2{font-size:23px;margin:0 0 14px;letter-spacing:-.03em}h3{font-size:17px;margin:0 0 10px}
.muted,.label{color:var(--muted);font-size:13px}.grid{display:grid;gap:16px}.grid-2{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:repeat(3,1fr)}.grid-4{grid-template-columns:repeat(4,1fr)}
.metric{font-size:28px;font-weight:950}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.space{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}
.section{display:none}.section.active{display:block}.hidden{display:none!important}
table{width:100%;border-collapse:collapse;font-size:14px;margin-top:10px}th,td{border-bottom:1px solid var(--border);padding:10px;text-align:left;vertical-align:middle}th{background:var(--card2);color:var(--muted)}td:first-child{min-width:210px}
.badge{display:inline-flex;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:800;border:1px solid var(--border);color:var(--muted)}
.badge.ok{background:var(--green);color:#dbffe5;border-color:#286238}.badge.late{background:var(--red);color:#ffdede;border-color:#793030}.badge.wait{background:var(--orange);color:#ffe6bd;border-color:#6e4e20}
.client-row{cursor:pointer}.client-row:hover{background:#1d1d24}
.tabs button{background:transparent;color:var(--muted);border:1px solid var(--border)}.tabs button.active{background:var(--text);color:#070708}
.client-view .coach-only,.client-view .coach-section{display:none!important}
.coach-view .client-only,.coach-view .client-section{display:none!important}
.value{white-space:pre-wrap;word-break:break-word}.paymonth{display:grid;grid-template-columns:1fr 120px 140px 120px 60px;gap:10px;align-items:center;margin-bottom:8px}
@media(max-width:900px){.app{grid-template-columns:1fr}aside{position:relative;height:auto}main{padding:18px}.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}.paymonth{grid-template-columns:1fr}h1{font-size:30px}}
body{background:#09090b}.app{display:block;min-height:100vh}main{max-width:1100px;margin:auto;padding:24px}.client-only,.coach-only,.coach-section{display:none!important}.login{max-width:760px;margin:40px auto}.login input{font-size:16px;padding:14px}.login button{margin-top:12px}.err{color:#ffb4b4;margin-top:10px}.public-nav button{background:var(--soft);color:var(--text);border:1px solid var(--border)}.public-nav button.active{background:var(--text);color:#070708}@media(max-width:900px){main{padding:14px}}</style></head><body><main><section id="login" class="login"><div class="hero"><h1>Baptiste Coaching</h1><div class="muted">Entre ton code client pour accéder à ton espace.</div></div><div class="card"><h2>Accès client</h2><input id="code" placeholder="Ton code client" onkeydown="if(event.key==='Enter') login()"><button onclick="login()">Ouvrir mon espace</button><div id="error" class="err"></div><div class="muted" style="margin-top:10px">Ton coach te donne ton code personnel.</div></div></section><section id="app" class="hidden"><div id="clientRender"></div></section></main><script>const CLIENTS={"leopold":{"code":"leopold","name":"léopold","intro":"Bienvenue dans ton espace coaching. Ici, tu retrouves ton programme complet.","goal":"Sèche","level":"Intermédiaire","start":"2026-07-02","end":"2026-10-02","cal":"2400 kcal","prot":"160 g","carbs":"250 g","fat":"70 g","workouts":[{"title":"Séance 1 — Push","muscles":"Pectoraux, épaules, triceps","note":"Technique propre, progression régulière.","exercises":[["Développé incliné haltères","4","8-10","2 min","3-1-1"],["Développé machine","3","10-12","90 sec","2-1-1"]]}],"meals":[{"title":"Repas 1","note":"Repas à adapter selon la faim.","macros":["550 kcal","35 g","55 g","22 g"],"foods":[["Œufs","3"],["Pain complet","80 g"],["Fruit","1"]]}],"shopping":"Œufs\\nPain complet\\nPoulet\\nRiz\\nLégumes\\nFruits","tracking":[["S1","","","","",""],["S2","","","","",""],["S3","","","","",""],["S4","","","","",""]],"publicNotes":"Check-in chaque semaine avec poids, photos, sommeil, faim, énergie et performances."},"baptiste":{"code":"baptiste","name":"baptiste ","intro":"Bienvenue dans ton espace coaching. Ici, tu retrouves ton programme complet.","goal":"Sèche","level":"Intermédiaire","start":"2026-07-02","end":"2026-10-02","cal":"2400 kcal","prot":"160 g","carbs":"250 g","fat":"70 g","workouts":[{"title":"Séance 1 — Push","muscles":"Pectoraux, épaules, triceps","note":"Technique propre, progression régulière.","exercises":[["Développé incliné haltères","4","8-10","2 min","3-1-1"],["Développé machine","3","10-12","90 sec","2-1-1"]]}],"meals":[{"title":"Repas 1","note":"Repas à adapter selon la faim.","macros":["550 kcal","35 g","55 g","22 g"],"foods":[["Œufs","3"],["Pain complet","80 g"],["Fruit","1"]]}],"shopping":"Œufs\\nPain complet\\nPoulet\\nRiz\\nLégumes\\nFruits","tracking":[["S1","","","","",""],["S2","","","","",""],["S3","","","","",""],["S4","","","","",""]],"publicNotes":"Check-in chaque semaine avec poids, photos, sommeil, faim, énergie et performances."},"david":{"code":"david","name":"maxence ","intro":"Bienvenue dans ton espace coaching. Ici, tu retrouves ton programme complet.","goal":"Sèche","level":"Intermédiaire","start":"2026-07-04","end":"2026-10-04","cal":"2000 kcal","prot":"130 g","carbs":"250 g","fat":"55 g","workouts":[{"title":"Séance 1 — Push","muscles":"Pectoraux, épaules, triceps","note":"Technique propre, progression régulière.\n\nCardio marche incliné 15° vitesse 5 ","exercises":[["Développé incliné smith","2","8","2 min","x"],["Développé couché smith ","2","8","2 min ","x"],["Dips","2","8","2 min ","x"],["élévation latéral poulie ","3","10-12","2 min ","1-2-1"],["triceps uni poulie ","3","10-12","2 min ","1-2-1"],["élévation frontal corde ","3","10-12","2 min ","1-2-1"],["triceps corde dos poulie ","3","10-12","2 min ","1-2-1"],["relevé de jambe ","3","12 ","2 min ","1-3-1"],["cardio tapis incliné ","1 ","200 cal ","20 min ",""]]},{"title":"Séance - 2 legs ","muscles":"quadriceps - ischions - adducteurs ","note":"échauffement articulaire début de séance complèt \nainsi que 2 séries de 20 répétions sur le leg curl et le leg extension pour préchauffer les muscles et articulation avant le squat et SDT monter progressive jusqu'a la charge de travail ","exercises":[["squat ","2","8","3 min ","x"],["SDT jambe semi tendu ","2","8 ","3 min ","x "],["leg extension ","3","10-12 ","2 min ","1-2-2"],["leg curl ","3","10-12","2 min ","1-2-2"],["adducteurs","3","10-12","2 min ","1-2-2"],["mollets","3 ","12 ","2 min ","1-2-2"]]},{"title":"séance - 3 Pull ","muscles":"Dos , biceps , arrière épaule ","note":"gardez le dos droit ressentir au maximum son dos donc contrôler la charge pour ressentir d'avantage \n\ncardio tapis incliné 15° vitesse 5 objectif 200 cal 17-20 min ","exercises":[["Tirage vertical ","2","8","2 min ","x"],["tirage horizontal prise large ","2","8","2 min ","x"],["Pull over corde ","3","10 ","2 min ","1-2-1"],["Facepull","3","10","2 min ","1-2-1"],["biceps uni poulie ","3 ","10-12","2 min ","1-2-1"],["biceps corde poulie","3 ","10-12","2 min ","1-2-1"],["Shrug altère ","3","10-12","2 min ","1-2-1"],["relevé de jambe ","3","12","2 min ","1-3-1"],["cardio tapis incliné ","1","200 cal ","20 min ","x"]]}],"meals":[{"title":"Repas 1 (midi) ","note":"légume a controlé pour les cals ","macros":["855kcal","72g","79g","28g"],"foods":[["Œufs","3"],["poulet ","200g"],["riz ","100"],["huile ","10g "],["légume volonté ","a controlé "]]},{"title":"repas 2 (soir)","note":"légume a controlé ","macros":["531kcal","40g","41 g","17g"],"foods":[["poulet ","100"],["oeuf ","2"],["patate douce ","200g "],["légume ","a volonté "],["huile d'olive ","5g "]]},{"title":"collation aprèm ","note":"1banane 100 cal environ plus ton shaker ","macros":["0 kcal","25 g","0 g","0 g"],"foods":[["banane ","1"],["shaker de prot ","1"]]},{"title":"repas plaisir ","note":"a calculer pour rester dans le déficit ","macros":["0 kcal","0 g","0 g","0 g"],"foods":[["glace ",""]]}],"shopping":"- oeuf poulet riz patates douce huile d'olive banane legumes pates \n\ntotale de la journée 137g prot 1600cal a 2000 max a toi de calculer les repas plaisir etc pour rester en déficit la c'est un exemple de journée type ","tracking":[["S1","","","","",""],["S2","","","","",""],["S3","","","","",""],["S4","","","","",""]],"publicNotes":"Check-in chaque semaine avec poids, photos, sommeil, faim, énergie et performances."}};function esc(v=''){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;')}function metric(k,v){return '<div class="card"><div class="label">'+esc(k)+'</div><div class="metric">'+esc(v)+'</div></div>'}let current=null;function login(){const code=document.getElementById('code').value.toLowerCase().replace(/[^a-z0-9]+/g,'').trim();current=CLIENTS[code];if(!current){document.getElementById('error').textContent='Code introuvable. Vérifie avec ton coach.';return}document.getElementById('login').classList.add('hidden');document.getElementById('app').classList.remove('hidden');renderClient(current)}function tab(id,btn){document.querySelectorAll('#clientRender .section').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.public-nav button').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}function renderClient(c){document.getElementById('clientRender').innerHTML='<div class="hero"><h1>'+esc(c.name)+'</h1><div class="muted">'+esc(c.intro)+'</div></div><div class="public-nav card"><button class="active" onclick="tab(\'cvProfile\',this)">Profil</button><button onclick="tab(\'cvTrain\',this)">Musculation</button><button onclick="tab(\'cvFood\',this)">Alimentation</button><button onclick="tab(\'cvFollow\',this)">Suivi</button><button onclick="tab(\'cvNotes\',this)">Notes</button></div><div id="cvProfile" class="section active">'+cvProfile(c)+'</div><div id="cvTrain" class="section">'+cvTrain(c)+'</div><div id="cvFood" class="section">'+cvFood(c)+'</div><div id="cvFollow" class="section">'+cvFollow(c)+'</div><div id="cvNotes" class="section">'+cvNotes(c)+'</div>'}function cvProfile(c){return '<div class="grid grid-4">'+metric('Objectif',c.goal)+metric('Niveau',c.level)+metric('Calories',c.cal)+metric('Protéines',c.prot)+'</div><div class="grid grid-4">'+metric('Glucides',c.carbs)+metric('Lipides',c.fat)+metric('Début',c.start)+metric('Fin',c.end)+'</div>'}function cvTrain(c){return '<div class="card"><h2>Programme musculation</h2></div>'+(c.workouts||[]).map(w=>'<div class="block"><h2>'+esc(w.title)+'</h2><div class="muted">'+esc(w.muscles)+'</div><table><thead><tr><th>Exercice</th><th>Séries</th><th>Rép.</th><th>Repos</th><th>Tempo</th></tr></thead><tbody>'+((w.exercises||[]).map(e=>'<tr>'+e.map(x=>'<td>'+esc(x)+'</td>').join('')+'</tr>').join(''))+'</tbody></table><div class="card"><h3>Consignes</h3><p class="value">'+esc(w.note)+'</p></div></div>').join('')}function cvFood(c){return '<div class="card"><h2>Programme alimentaire</h2></div><div class="grid grid-2">'+(c.meals||[]).map(m=>'<div class="block"><h2>'+esc(m.title)+'</h2><table><thead><tr><th>Aliment</th><th>Quantité</th></tr></thead><tbody>'+((m.foods||[]).map(f=>'<tr><td>'+esc(f[0])+'</td><td>'+esc(f[1])+'</td></tr>').join(''))+'</tbody></table><div class="grid grid-4">'+metric('Calories',(m.macros||[])[0]||'')+metric('Prot.',(m.macros||[])[1]||'')+metric('Gluc.',(m.macros||[])[2]||'')+metric('Lip.',(m.macros||[])[3]||'')+'</div><div class="card"><h3>Consignes</h3><p class="value">'+esc(m.note)+'</p></div></div>').join('')+'</div><div class="card"><h2>Liste de courses</h2><p class="value">'+esc(c.shopping)+'</p></div>'}function cvFollow(c){return '<div class="card"><h2>Suivi</h2><table><thead><tr><th>Semaine</th><th>Poids</th><th>Tour taille</th><th>Photos</th><th>Sommeil</th><th>Notes</th></tr></thead><tbody>'+((c.tracking||[]).map(r=>'<tr>'+r.map(x=>'<td>'+esc(x)+'</td>').join('')+'</tr>').join(''))+'</tbody></table></div>'}function cvNotes(c){return '<div class="card"><h2>Notes du coach</h2><p class="value">'+esc(c.publicNotes)+'</p></div>'}</script></body></html>
